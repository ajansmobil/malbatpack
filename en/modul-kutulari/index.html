<script>
  setTimeout(function() {
    var menuButton = document.querySelector(".h0000menumobil");
    var menu = document.querySelector(".h0000menulist");
    var overlay = document.querySelector(".h0000menuoverlay");
    var closeButton = document.querySelector(".h0000menuclose");
    function openMenu() {
      if (menu && overlay) {
        menu.classList.add("active");
        overlay.classList.add("active");
        overlay.setAttribute("aria-hidden", "false");
        if (menuButton) {
          menuButton.setAttribute("aria-expanded", "true");
        }
        document.body.style.overflow = "hidden";
      }
    }
    
    function closeMenu() {
      if (menu && overlay) {
        menu.classList.remove("active");
        overlay.classList.remove("active");
        overlay.setAttribute("aria-hidden", "true");
        if (menuButton) {
          menuButton.setAttribute("aria-expanded", "false");
        }
        document.body.style.overflow = "";
        if (menuButton) {
          menuButton.focus();
        }
      }
    }
    
    if (menuButton && menu && overlay) {
      menuButton.addEventListener("click", function () {
        var isExpanded = menuButton.getAttribute("aria-expanded") === "true";
        if (isExpanded) {
          closeMenu();
        } else {
          openMenu();
        }
      });
      if (closeButton) {
        closeButton.addEventListener("click", function () {
          closeMenu();
        });
      }
      overlay.addEventListener("click", function () {
        closeMenu();
      });
      menuButton.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          var isExpanded = menuButton.getAttribute("aria-expanded") === "true";
          if (isExpanded) {
            closeMenu();
          } else {
            openMenu();
          }
        }
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && menuButton.getAttribute("aria-expanded") === "true") {
          closeMenu();
        }
      });
    }
  }, 100);
</script>
